<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4-Road Traffic Dashboard</title>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0f1720; color: #e8eef4; }
    header { padding: 14px 18px; border-bottom: 1px solid #243446; display: flex; justify-content: space-between; }
    main { padding: 16px; max-width: 1300px; margin: auto; }
    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .card { background: #121c26; border: 1px solid #243446; border-radius: 10px; padding: 12px; }
    .road { margin-bottom: 12px; }
    .road h3 { margin: 0 0 8px; font-size: 14px; }
    .state { font-size: 20px; font-weight: bold; }
    .green { color: #00e676; }
    .red { color: #ff5b5b; }
    .bar { height: 8px; border-radius: 8px; background: #1d2b39; overflow: hidden; margin-top: 8px; }
    .bar > div { height: 100%; width: 0%; background: #00c2ff; transition: width 0.4s; }
    .kpis { margin: 12px 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .kpis .card div:first-child { color: #87a2b8; font-size: 12px; }
    .kpis .card div:last-child { margin-top: 6px; font-size: 26px; font-weight: 700; }
    canvas { width: 100%; height: 280px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { border-bottom: 1px solid #243446; padding: 6px; text-align: left; }
  </style>
</head>
<body>
  <header>
    <strong>Traffic Dashboard - 4 Roads / 4 Cameras</strong>
    <span id="status">Disconnected</span>
  </header>
  <main>
    <div class="kpis">
      <div class="card"><div>Total Vehicles</div><div id="totalVeh">0</div></div>
      <div class="card"><div>Density</div><div id="density">0.00</div></div>
      <div class="card"><div>Total Waiting (s)</div><div id="totalWait">0</div></div>
    </div>

    <div class="grid4">
      <div class="card road"><h3>Road 1</h3><div id="s1" class="state red">RED</div><div id="m1">Vehicles: 0 | Green: 0s</div><div class="bar"><div id="b1"></div></div></div>
      <div class="card road"><h3>Road 2</h3><div id="s2" class="state red">RED</div><div id="m2">Vehicles: 0 | Green: 0s</div><div class="bar"><div id="b2"></div></div></div>
      <div class="card road"><h3>Road 3</h3><div id="s3" class="state red">RED</div><div id="m3">Vehicles: 0 | Green: 0s</div><div class="bar"><div id="b3"></div></div></div>
      <div class="card road"><h3>Road 4</h3><div id="s4" class="state red">RED</div><div id="m4">Vehicles: 0 | Green: 0s</div><div class="bar"><div id="b4"></div></div></div>
    </div>

    <div class="card" style="margin-top: 12px;">
      <canvas id="c"></canvas>
    </div>

    <div class="card" style="margin-top: 12px; max-height: 300px; overflow: auto;">
      <table>
        <thead>
          <tr><th>Time</th><th>L1</th><th>L2</th><th>L3</th><th>L4</th><th>Active</th><th>Density</th><th>Wait</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>

  <script>
    const labels = [];
    const ds = [
      { label: 'L1', data: [], borderColor: '#00e5c8' },
      { label: 'L2', data: [], borderColor: '#ffb300' },
      { label: 'L3', data: [], borderColor: '#35a7ff' },
      { label: 'L4', data: [], borderColor: '#c77dff' },
      { label: 'Density', data: [], borderColor: '#ffffff', borderDash: [6,4] },
    ].map(x => ({ ...x, tension: 0.35, pointRadius: 1.5 }));

    const chart = new Chart(document.getElementById('c'), {
      type: 'line',
      data: { labels, datasets: ds },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#b7c7d6' } } },
        scales: { x: { ticks: { color: '#7f95a8' } }, y: { ticks: { color: '#7f95a8' }, beginAtZero: true } } }
    });

    function setRoad(i, signal, veh, greenSec, maxVeh) {
      const st = document.getElementById('s' + i);
      st.textContent = signal;
      st.className = 'state ' + (signal === 'GREEN' ? 'green' : 'red');
      document.getElementById('m' + i).textContent = `Vehicles: ${veh} | Green: ${greenSec}s`;
      const pct = Math.min(100, Math.round((veh / Math.max(maxVeh, 1)) * 100));
      document.getElementById('b' + i).style.width = pct + '%';
    }

    function addRow(d) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${new Date(d.timestamp).toLocaleTimeString('en-GB',{hour12:false})}</td>
                      <td>${d.lane1}</td><td>${d.lane2}</td><td>${d.lane3||0}</td><td>${d.lane4||0}</td>
                      <td>${d.active_lane||0}</td><td>${(+d.density).toFixed(2)}</td><td>${d.total_waiting||0}</td>`;
      const tbody = document.getElementById('rows');
      tbody.insertBefore(tr, tbody.firstChild);
      while (tbody.rows.length > 100) tbody.deleteRow(tbody.rows.length - 1);
    }

    function onData(d) {
      const l1 = d.lane1 || 0, l2 = d.lane2 || 0, l3 = d.lane3 || 0, l4 = d.lane4 || 0;
      const maxVeh = Math.max(l1, l2, l3, l4, 1);
      setRoad(1, d.signal_l1 || 'RED', l1, d.green_time_l1 || 0, maxVeh);
      setRoad(2, d.signal_l2 || 'RED', l2, d.green_time_l2 || 0, maxVeh);
      setRoad(3, d.signal_l3 || 'RED', l3, d.green_time_l3 || 0, maxVeh);
      setRoad(4, d.signal_l4 || 'RED', l4, d.green_time_l4 || 0, maxVeh);

      document.getElementById('totalVeh').textContent = l1 + l2 + l3 + l4;
      document.getElementById('density').textContent = (+d.density).toFixed(2);
      document.getElementById('totalWait').textContent = d.total_waiting || 0;

      labels.push(new Date(d.timestamp).toLocaleTimeString('en-GB',{hour12:false}));
      ds[0].data.push(l1); ds[1].data.push(l2); ds[2].data.push(l3); ds[3].data.push(l4); ds[4].data.push(+d.density || 0);
      if (labels.length > 60) { labels.shift(); ds.forEach(x => x.data.shift()); }
      chart.update('none');
      addRow(d);
    }

    const socket = io('http://localhost:3000', { transports: ['websocket'] });
    socket.on('connect', () => document.getElementById('status').textContent = 'Connected');
    socket.on('disconnect', () => document.getElementById('status').textContent = 'Disconnected');
    socket.on('update-dashboard', onData);

    fetch('http://localhost:3000/history?limit=60')
      .then(r => r.json())
      .then(x => (x.data || []).forEach(onData))
      .catch(() => {});
  </script>
</body>
</html>
